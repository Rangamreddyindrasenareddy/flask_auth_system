<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

    <h2>Register</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color:red;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        ><br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        ><br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        ><br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <a href="{{ url_for('login') }}">
        Already have an account? Login
    </a>

</body>
</html>
